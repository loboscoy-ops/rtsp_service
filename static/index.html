<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTSP камеры</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b98a8;
      --ok: #3ecf8e;
      --bad: #f07178;
      --accent: #5c9eff;
      --border: #243044;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem 1.5rem 2rem;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.6rem 1.25rem;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0; }
    .meta { color: var(--muted); font-size: 0.82rem; }
    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.82rem;
    }
    button.sm { padding: 0.28rem 0.55rem; font-size: 0.75rem; }
    button.secondary { background: #2d3a4d; color: var(--text); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .warn {
      background: #3d2a1a;
      border: 1px solid #8a5a2a;
      color: #f0c78a;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 0.85rem;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center; }
    a.sheet-link {
      color: var(--accent);
      font-size: 0.82rem;
      text-decoration: none;
    }
    a.sheet-link:hover { text-decoration: underline; }
    .wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      margin-bottom: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
      min-width: 720px;
    }
    th, td {
      padding: 0.55rem 0.65rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.2);
    }
    tr:last-child td { border-bottom: none; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.78rem; color: var(--muted); word-break: break-all; }
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.18rem 0.42rem;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .badge.ok { background: rgba(62, 207, 142, 0.2); color: var(--ok); }
    .badge.bad { background: rgba(240, 113, 120, 0.15); color: var(--bad); }
    .badge.unk { background: #2d3544; color: var(--muted); }
    .st-sub { font-size: 0.74rem; color: var(--muted); margin-top: 0.25rem; line-height: 1.35; }
    .st-err { font-size: 0.72rem; color: var(--bad); margin-top: 0.2rem; max-width: 280px; }
    h2.log-h {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: var(--muted);
    }
    .log-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      max-height: 280px;
      overflow-y: auto;
      font-size: 0.78rem;
    }
    .log-row {
      padding: 0.4rem 0.65rem;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 9.5rem 1fr;
      gap: 0.5rem;
    }
    .log-row:last-child { border-bottom: none; }
    .log-time { color: var(--muted); font-family: ui-monospace, monospace; }
    .log-msg { word-break: break-word; }
    .log-msg.ok { color: var(--ok); }
    .log-msg.bad { color: var(--bad); }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; max-width: 52rem; line-height: 1.45; }
    #sheets-access { max-width: 40rem; line-height: 1.35; }
    #sheets-access.state-ok { color: var(--ok); }
    #sheets-access.state-bad { color: var(--bad); }
    #sheets-access.state-wait { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Камеры</h1>
    <span class="meta" id="updated"></span>
    <span class="meta" id="ping-hint"></span>
    <div class="toolbar">
      <button type="button" id="btn-refresh">Обновить таблицу</button>
      <button type="button" class="secondary" id="btn-ping-all">Ping всех</button>
      <button type="button" class="secondary sm" id="btn-sheets-access">Проверить доступ к Google</button>
      <a class="sheet-link" id="sheet-link" href="#" style="display:none;" target="_blank" rel="noopener">Открыть таблицу</a>
    </div>
    <p class="meta" id="sheets-access" style="width:100%; margin:0.35rem 0 0;">Проверка доступа к Google Sheets…</p>
  </header>
  <div id="alert" class="warn" style="display:none;"></div>
  <p class="hint" id="mode-hint"></p>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>Проект</th>
          <th>Наименование</th>
          <th>Тип камеры</th>
          <th>Поток</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <h2 class="log-h">Журнал опросов (ping)</h2>
  <div class="log-box" id="log-box"></div>

  <script>
    const tbody = document.getElementById("tbody");
    const alertEl = document.getElementById("alert");
    const updatedEl = document.getElementById("updated");
    const pingHintEl = document.getElementById("ping-hint");
    const modeHintEl = document.getElementById("mode-hint");
    const sheetLink = document.getElementById("sheet-link");
    const logBox = document.getElementById("log-box");
    const sheetsAccessEl = document.getElementById("sheets-access");
    document.getElementById("btn-refresh").onclick = async () => {
      await load(true);
      checkSheetsAccess();
    };
    document.getElementById("btn-ping-all").onclick = () => pingAll();
    document.getElementById("btn-sheets-access").onclick = () => checkSheetsAccess();

    function setSheetsAccessClass(state) {
      sheetsAccessEl.classList.remove("state-ok", "state-bad", "state-wait");
      sheetsAccessEl.classList.add(state);
    }

    async function checkSheetsAccess() {
      const btn = document.getElementById("btn-sheets-access");
      btn.disabled = true;
      setSheetsAccessClass("state-wait");
      sheetsAccessEl.textContent = "Проверка доступа к Google Sheets…";
      try {
        const res = await fetch("/api/sheets-access");
        const d = await res.json().catch(() => ({}));
        if (!res.ok) {
          setSheetsAccessClass("state-bad");
          sheetsAccessEl.textContent = "Google Sheets: " + (apiErrorText(d) || res.statusText);
          return;
        }
        if (d.ok) {
          setSheetsAccessClass("state-ok");
          let s = "Google Sheets: OK";
          if (d.spreadsheet_title) s += " · «" + d.spreadsheet_title + "»";
          s += " · листов: " + (d.sheets_count ?? "—");
          if (d.camera_sheet) {
            if (d.camera_sheet.mode === "table") {
              s += " · камеры: «" + (d.camera_sheet.title || "") + "» (gid " + d.camera_sheet.gid + ")";
            } else {
              s += " · " + (d.camera_sheet.message || "legacy");
              if (d.camera_sheet.sample_sheet_title) {
                s += ", тест чтения: «" + d.camera_sheet.sample_sheet_title + "»";
              }
            }
          }
          s += d.read_sample_ok ? " · чтение A1: OK" : " · чтение A1: —";
          s += " · " + fmtTs(d.checked_at);
          sheetsAccessEl.textContent = s;
        } else {
          setSheetsAccessClass("state-bad");
          sheetsAccessEl.textContent = "Google Sheets: нет доступа — " + (d.error || "неизвестная ошибка");
        }
      } catch (e) {
        setSheetsAccessClass("state-bad");
        sheetsAccessEl.textContent = "Google Sheets: сеть — " + (e && e.message ? e.message : e);
      } finally {
        btn.disabled = false;
      }
    }

    function fmtTs(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString("ru-RU", {
          day: "2-digit", month: "2-digit", year: "numeric",
          hour: "2-digit", minute: "2-digit", second: "2-digit",
        });
      } catch { return iso; }
    }

    function badge(online) {
      if (online === true) return '<span class="badge ok">Online</span>';
      if (online === false) return '<span class="badge bad">Offline</span>';
      return '<span class="badge unk">Не проверено</span>';
    }

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.style.display = "block";
    }

    function apiErrorText(t) {
      if (!t || typeof t !== "object") return "";
      const d = t.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) return d.map((x) => x.msg || JSON.stringify(x)).join("; ");
      return "";
    }

    function renderLogs(logs) {
      logBox.innerHTML = "";
      if (!logs || !logs.length) {
        logBox.innerHTML = '<div class="log-row"><span class="log-time">—</span><span class="log-msg">Записей пока нет</span></div>';
        return;
      }
      for (const e of logs) {
        const row = document.createElement("div");
        row.className = "log-row";
        const okc = e.ok === true ? "ok" : e.ok === false ? "bad" : "";
        const label = [e.project, e.name].filter(Boolean).join(" · ") || e.camera_id || "";
        row.innerHTML =
          '<span class="log-time">' + escapeHtml(fmtTs(e.at)) + '</span>' +
          '<span class="log-msg ' + okc + '">' +
          escapeHtml(label ? label + " — " : "") + escapeHtml(e.message || "") +
          "</span>";
        logBox.appendChild(row);
      }
    }

    async function load(refreshSheets) {
      alertEl.style.display = "none";
      const url = refreshSheets ? "/api/cameras/refresh-sheets" : "/api/cameras";
      const opt = refreshSheets ? { method: "POST" } : {};
      let res;
      try {
        res = await fetch(url, opt);
      } catch (e) {
        showAlert("Сеть: не удалось связаться с сервером (" + (e && e.message ? e.message : e) + ")");
        return;
      }
      let data;
      try {
        data = await res.json();
      } catch {
        showAlert("Ответ сервера не JSON: " + res.status + " " + res.statusText);
        return;
      }
      if (!res.ok) {
        showAlert(apiErrorText(data) || res.status + " " + res.statusText);
        return;
      }
      if (data.sheets_error) {
        showAlert("Таблица: " + data.sheets_error);
      }
      if (data.spreadsheet_url) {
        sheetLink.href = data.spreadsheet_url;
        sheetLink.style.display = "inline";
      } else {
        sheetLink.style.display = "none";
      }
      updatedEl.textContent = data.sheets_updated_at
        ? "Данные: " + fmtTs(data.sheets_updated_at)
        : "";
      const pmin = Math.round((data.ping_interval_sec || 1800) / 60);
      pingHintEl.textContent = "Авто ping: раз в " + pmin + " мин";
      if (data.table_mode) {
        const st = data.cameras_sheet_title
          ? "«" + data.cameras_sheet_title + "»"
          : (data.cameras_sheet_gid != null
            ? "gid=" + data.cameras_sheet_gid
            : "«" + (data.cameras_sheet || "Камеры") + "»");
        modeHintEl.textContent =
          "Режим таблицы: лист " + st +
          ". Первая строка — заголовки (Проект, Наименование, Тип, URL с rtsp://). Дальше строки камер. " +
          "Статус по ICMP ping: часть камер не отвечает на ping при рабочем RTSP — ориентируйтесь на ffplay.";
      } else {
        modeHintEl.textContent =
          "Режим по вкладкам: на каждом листе ищется RTSP URL. Чтобы использовать колонки Проект / Камера / Тип, создайте лист «" +
          (data.cameras_sheet || "Камеры") + "» с таблицей. Статус — по ping хоста из URL.";
      }
      tbody.innerHTML = "";
      renderLogs(data.logs);
      if (!data.cameras.length) {
        tbody.innerHTML =
          "<tr><td colspan=\"5\" class=\"mono\">Нет камер. " +
          (data.table_mode
            ? "Добавьте строки с заполненным RTSP в колонке URL."
            : "Добавьте лист с ячейкой rtsp://… или лист «Камеры» с таблицей.") +
          "</td></tr>";
        return;
      }
      for (const c of data.cameras) {
        const tr = document.createElement("tr");
        const hostLine = c.ping_host
          ? "<div class=\"st-sub\">ping → " + escapeHtml(c.ping_host) + "</div>"
          : "";
        const errLine = c.last_error && c.online === false
          ? "<div class=\"st-err\">" + escapeHtml(c.last_error) + "</div>"
          : "";
        tr.innerHTML =
          "<td>" + escapeHtml(c.project || "—") + "</td>" +
          "<td>" + escapeHtml(c.name || "—") + "</td>" +
          "<td>" + escapeHtml(c.camera_type || "—") + "</td>" +
          "<td class=\"mono\">" + escapeHtml(c.rtsp_masked || "") +
          (c.cell ? " <span class=\"st-sub\">" + escapeHtml(c.cell) + "</span>" : "") +
          "<div class=\"st-sub\"><button type=\"button\" class=\"secondary sm\" data-play=\"" +
          escapeHtml(c.camera_id) + "\">Открыть RTSP (ffplay)</button>" +
          " <button type=\"button\" class=\"sm\" data-ping=\"" + escapeHtml(c.camera_id) + "\">Ping</button></div></td>" +
          "<td>" + badge(c.online) +
          "<div class=\"st-sub\">Проверено: " + fmtTs(c.last_check_at) + "</div>" +
          "<div class=\"st-sub\">В сети (ping OK): " + fmtTs(c.last_seen_online) + "</div>" +
          hostLine + errLine + "</td>";
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll("[data-play]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const id = btn.getAttribute("data-play");
          const r = await fetch("/api/cameras/" + encodeURIComponent(id) + "/ffplay", { method: "POST" });
          btn.disabled = false;
          if (!r.ok) {
            const t = await r.json().catch(() => ({}));
            alert(apiErrorText(t) || r.statusText);
          } else await load(false);
        });
      });
      tbody.querySelectorAll("[data-ping]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const id = btn.getAttribute("data-ping");
          await fetch("/api/cameras/" + encodeURIComponent(id) + "/ping", { method: "POST" });
          await load(false);
          btn.disabled = false;
        });
      });
    }

    async function pingAll() {
      const btn = document.getElementById("btn-ping-all");
      btn.disabled = true;
      try {
        const res = await fetch("/api/cameras/ping-all", { method: "POST" });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showAlert(apiErrorText(data) || res.statusText);
          return;
        }
        await load(false);
      } catch (e) {
        showAlert("Сеть: " + (e && e.message ? e.message : e));
      } finally {
        btn.disabled = false;
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    load(false);
    checkSheetsAccess();
    setInterval(() => load(false), 20000);
    setInterval(() => checkSheetsAccess(), 5 * 60 * 1000);
  </script>
</body>
</html>
