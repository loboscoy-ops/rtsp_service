<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTSP камеры</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b98a8;
      --ok: #3ecf8e;
      --bad: #f07178;
      --accent: #5c9eff;
      --border: #243044;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem 1.5rem 2rem;
    }
    header { margin-bottom: 0.75rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.5rem; }
    .meta { color: var(--muted); font-size: 0.82rem; }
    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.82rem;
    }
    button.sm { padding: 0.28rem 0.55rem; font-size: 0.75rem; }
    button.secondary { background: #2d3a4d; color: var(--text); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .warn {
      background: #3d2a1a;
      border: 1px solid #8a5a2a;
      color: #f0c78a;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 0.85rem;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center; margin-bottom: 0.35rem; }
    a.sheet-link { color: var(--accent); font-size: 0.82rem; text-decoration: none; }
    a.sheet-link:hover { text-decoration: underline; }
    .upload-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin: 0.5rem 0 0.75rem; }
    .upload-row input[type=file] { max-width: 220px; font-size: 0.8rem; color: var(--muted); }
    #map {
      height: 380px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      background: #151a22;
    }
    .leaflet-container { font-family: inherit; }
    .wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      margin-bottom: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
      min-width: 1100px;
    }
    th, td {
      padding: 0.55rem 0.65rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: rgba(0,0,0,0.2);
    }
    tr:last-child td { border-bottom: none; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.78rem; color: var(--muted); word-break: break-all; }
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.18rem 0.42rem;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .badge.ok { background: rgba(62, 207, 142, 0.2); color: var(--ok); }
    .badge.bad { background: rgba(240, 113, 120, 0.15); color: var(--bad); }
    .badge.unk { background: #2d3544; color: var(--muted); }
    .st-sub { font-size: 0.74rem; color: var(--muted); margin-top: 0.25rem; line-height: 1.35; }
    .st-err { font-size: 0.72rem; color: var(--bad); margin-top: 0.2rem; max-width: 280px; }
    h2.log-h { font-size: 0.95rem; font-weight: 600; margin: 0 0 0.5rem; color: var(--muted); }
    .log-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      max-height: 280px;
      overflow-y: auto;
      font-size: 0.78rem;
    }
    .log-row {
      padding: 0.4rem 0.65rem;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 9.5rem 1fr;
      gap: 0.5rem;
    }
    .log-row:last-child { border-bottom: none; }
    .log-time { color: var(--muted); font-family: ui-monospace, monospace; }
    .log-msg { word-break: break-word; }
    .log-msg.ok { color: var(--ok); }
    .log-msg.bad { color: var(--bad); }
    .hint { font-size: 0.8rem; color: var(--muted); margin: 0.35rem 0 0.5rem; max-width: 56rem; line-height: 1.45; }
    #sheets-access { max-width: 48rem; line-height: 1.35; margin: 0.25rem 0 0; }
    #sheets-access.state-ok { color: var(--ok); }
    #sheets-access.state-bad { color: var(--bad); }
    #sheets-access.state-wait { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Камеры</h1>
    <div class="toolbar">
      <span class="meta" id="updated"></span>
      <span class="meta" id="ping-hint"></span>
      <button type="button" id="btn-reload">Обновить данные</button>
      <button type="button" class="secondary" id="btn-ping-all">Ping всех</button>
      <button type="button" class="secondary sm" id="btn-sheets-access" style="display:none;">Проверить Google Sheets</button>
      <a class="sheet-link" id="sheet-link" href="#" style="display:none;" target="_blank" rel="noopener">Открыть таблицу</a>
    </div>
    <div class="upload-row" id="excel-upload-row">
      <input type="file" id="file-xlsx" accept=".xlsx" />
      <button type="button" id="btn-upload">Загрузить Excel</button>
      <span class="meta" id="excel-path"></span>
    </div>
    <p class="meta" id="sheets-access" style="display:none;"></p>
  </header>
  <div id="alert" class="warn" style="display:none;"></div>
  <p class="hint" id="mode-hint"></p>
  <div id="map"></div>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>№ п/п</th>
          <th>УИН</th>
          <th>Наименование объекта</th>
          <th>Адрес объекта</th>
          <th>GPS</th>
          <th>Тип</th>
          <th>Проект</th>
          <th>Поток</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <h2 class="log-h">Журнал опросов (ping)</h2>
  <div class="log-box" id="log-box"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    let dataSource = "excel";
    let mapInstance = null;
    let markerLayer = null;

    const tbody = document.getElementById("tbody");
    const alertEl = document.getElementById("alert");
    const updatedEl = document.getElementById("updated");
    const pingHintEl = document.getElementById("ping-hint");
    const modeHintEl = document.getElementById("mode-hint");
    const sheetLink = document.getElementById("sheet-link");
    const logBox = document.getElementById("log-box");
    const sheetsAccessEl = document.getElementById("sheets-access");
    const excelPathEl = document.getElementById("excel-path");
    const excelUploadRow = document.getElementById("excel-upload-row");
    const btnSheetsAccess = document.getElementById("btn-sheets-access");

    document.getElementById("btn-reload").onclick = () => load(true);
    document.getElementById("btn-ping-all").onclick = () => pingAll();
    btnSheetsAccess.onclick = () => checkSheetsAccess();
    document.getElementById("btn-upload").onclick = () => uploadExcel();

    function setSheetsAccessClass(state) {
      sheetsAccessEl.classList.remove("state-ok", "state-bad", "state-wait");
      sheetsAccessEl.classList.add(state);
    }

    async function checkSheetsAccess() {
      if (dataSource !== "sheets") return;
      btnSheetsAccess.disabled = true;
      setSheetsAccessClass("state-wait");
      sheetsAccessEl.style.display = "block";
      sheetsAccessEl.textContent = "Проверка Google Sheets…";
      try {
        const res = await fetch("/api/sheets-access");
        const d = await res.json().catch(() => ({}));
        if (d.skipped) {
          setSheetsAccessClass("state-wait");
          sheetsAccessEl.textContent = d.message || "";
          return;
        }
        if (!res.ok) {
          setSheetsAccessClass("state-bad");
          sheetsAccessEl.textContent = "Google Sheets: " + (apiErrorText(d) || res.statusText);
          return;
        }
        if (d.ok) {
          setSheetsAccessClass("state-ok");
          let s = "Google Sheets: OK";
          if (d.auth_mode === "api_key") s += " [API key]";
          else if (d.auth_mode === "service_account") s += " [service account]";
          if (d.spreadsheet_title) s += " · «" + d.spreadsheet_title + "»";
          s += " · листов: " + (d.sheets_count ?? "—");
          if (d.camera_sheet && d.camera_sheet.mode === "table") {
            s += " · «" + (d.camera_sheet.title || "") + "» (gid " + d.camera_sheet.gid + ")";
          }
          s += d.read_sample_ok ? " · A1: OK" : "";
          s += " · " + fmtTs(d.checked_at);
          sheetsAccessEl.textContent = s;
        } else {
          setSheetsAccessClass("state-bad");
          sheetsAccessEl.textContent = "Google Sheets: " + (d.error || "ошибка");
        }
      } catch (e) {
        setSheetsAccessClass("state-bad");
        sheetsAccessEl.textContent = "Google Sheets: сеть — " + (e && e.message ? e.message : e);
      } finally {
        btnSheetsAccess.disabled = false;
      }
    }

    function fmtTs(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString("ru-RU", {
          day: "2-digit", month: "2-digit", year: "numeric",
          hour: "2-digit", minute: "2-digit", second: "2-digit",
        });
      } catch { return iso; }
    }

    function fmtCoord(c) {
      if (c.lat != null && c.lon != null) {
        return Number(c.lat).toFixed(5) + ", " + Number(c.lon).toFixed(5);
      }
      return "—";
    }

    function badge(online) {
      if (online === true) return '<span class="badge ok">Online</span>';
      if (online === false) return '<span class="badge bad">Offline</span>';
      return '<span class="badge unk">Не проверено</span>';
    }

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.style.display = "block";
    }

    function apiErrorText(t) {
      if (!t || typeof t !== "object") return "";
      const d = t.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) return d.map((x) => x.msg || JSON.stringify(x)).join("; ");
      return "";
    }

    function renderLogs(logs) {
      logBox.innerHTML = "";
      if (!logs || !logs.length) {
        logBox.innerHTML = '<div class="log-row"><span class="log-time">—</span><span class="log-msg">Записей пока нет</span></div>';
        return;
      }
      for (const e of logs) {
        const row = document.createElement("div");
        row.className = "log-row";
        const okc = e.ok === true ? "ok" : e.ok === false ? "bad" : "";
        const label = [e.project, e.name].filter(Boolean).join(" · ") || e.camera_id || "";
        row.innerHTML =
          '<span class="log-time">' + escapeHtml(fmtTs(e.at)) + '</span>' +
          '<span class="log-msg ' + okc + '">' +
          escapeHtml(label ? label + " — " : "") + escapeHtml(e.message || "") +
          "</span>";
        logBox.appendChild(row);
      }
    }

    function markerColor(online) {
      if (online === true) return "#3ecf8e";
      if (online === false) return "#f07178";
      return "#8b98a8";
    }

    function updateMap(cameras) {
      const withC = (cameras || []).filter(function (c) {
        return c.lat != null && c.lon != null && !isNaN(c.lat) && !isNaN(c.lon);
      });
      if (typeof L === "undefined") return;
      if (!mapInstance) {
        mapInstance = L.map("map", { scrollWheelZoom: true }).setView([55.751244, 37.618423], 10);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap",
          maxZoom: 19,
        }).addTo(mapInstance);
        markerLayer = L.layerGroup().addTo(mapInstance);
      }
      markerLayer.clearLayers();
      const bounds = [];
      withC.forEach(function (c) {
        const col = markerColor(c.online);
        const m = L.circleMarker([c.lat, c.lon], {
          radius: 10,
          color: "#1a2332",
          weight: 2,
          fillColor: col,
          fillOpacity: 0.95,
        });
        const title = [c.project, c.name].filter(Boolean).join(" — ") || c.camera_id;
        m.bindPopup(
          "<b>" + escapeHtml(title) + "</b><br>" +
          badge(c.online) +
          "<br><span style='font-size:11px;color:#666'>" + escapeHtml(fmtCoord(c)) + "</span>"
        );
        m.addTo(markerLayer);
        bounds.push([c.lat, c.lon]);
      });
      if (bounds.length === 1) {
        mapInstance.setView(bounds[0], 14);
      } else if (bounds.length > 1) {
        mapInstance.fitBounds(bounds, { padding: [36, 36], maxZoom: 15 });
      }
    }

    async function load(reload) {
      alertEl.style.display = "none";
      const url = reload
        ? (dataSource === "sheets" ? "/api/cameras/refresh-sheets" : "/api/cameras/reload-excel")
        : "/api/cameras";
      const opt = reload ? { method: "POST" } : {};
      let res;
      try {
        res = await fetch(url, opt);
      } catch (e) {
        showAlert("Сеть: " + (e && e.message ? e.message : e));
        return;
      }
      let data;
      try {
        data = await res.json();
      } catch {
        showAlert("Ответ не JSON: " + res.status);
        return;
      }
      if (!res.ok) {
        showAlert(apiErrorText(data) || res.statusText);
        return;
      }
      dataSource = data.data_source || "excel";
      const loadErr = data.load_error || data.sheets_error;
      if (loadErr) {
        showAlert(loadErr);
      }
      if (dataSource === "excel") {
        excelUploadRow.style.display = "flex";
        btnSheetsAccess.style.display = "none";
        sheetsAccessEl.style.display = "none";
        if (data.excel_path) excelPathEl.textContent = "Файл: " + data.excel_path;
        modeHintEl.textContent =
          "Режим Excel: колонки как в вашей таблице — № п/п, УИН, наименование объекта, адрес объекта, GPS координаты, " +
          "ссылка на видеотрансляцию (RTSP), тип, проект. В таблице вместо ссылки — только кнопка просмотра. " +
          "GPS: два числа через запятую. Карта: зелёный — online, красный — offline.";
      } else {
        excelUploadRow.style.display = "none";
        btnSheetsAccess.style.display = "inline-block";
        sheetsAccessEl.style.display = "block";
        modeHintEl.textContent = "Режим Google Sheets (DATA_SOURCE=sheets).";
        checkSheetsAccess();
      }
      updatedEl.textContent = data.sheets_updated_at ? "Данные: " + fmtTs(data.sheets_updated_at) : "";
      const pmin = Math.round((data.ping_interval_sec || 1800) / 60);
      pingHintEl.textContent = "Авто ping: раз в " + pmin + " мин";
      if (data.spreadsheet_url) {
        sheetLink.href = data.spreadsheet_url;
        sheetLink.style.display = "inline";
      } else {
        sheetLink.style.display = "none";
      }
      tbody.innerHTML = "";
      renderLogs(data.logs);
      updateMap(data.cameras || []);
      if (!(data.cameras || []).length) {
        tbody.innerHTML =
          "<tr><td colspan=\"9\" class=\"mono\">Нет камер. Загрузите .xlsx (колонка «Ссылка на видеотрансляцию» с rtsp://…) или проверьте файл.</td></tr>";
        return;
      }
      for (const c of data.cameras) {
        const tr = document.createElement("tr");
        const hostLine = c.ping_host ? "<div class=\"st-sub\">ping → " + escapeHtml(c.ping_host) + "</div>" : "";
        const errLine = c.last_error && c.online === false
          ? "<div class=\"st-err\">" + escapeHtml(c.last_error) + "</div>"
          : "";
        tr.innerHTML =
          "<td>" + escapeHtml(c.row_no || "—") + "</td>" +
          "<td class=\"mono\">" + escapeHtml(c.uin || "—") + "</td>" +
          "<td>" + escapeHtml(c.name || "—") + "</td>" +
          "<td>" + escapeHtml(c.address || "—") + "</td>" +
          "<td class=\"mono\">" + escapeHtml(fmtCoord(c)) + "</td>" +
          "<td>" + escapeHtml(c.camera_type || "—") + "</td>" +
          "<td>" + escapeHtml(c.project || "—") + "</td>" +
          "<td><button type=\"button\" class=\"secondary\" data-play=\"" + escapeHtml(c.camera_id) +
          "\">Просмотр потока</button><div class=\"st-sub\"><button type=\"button\" class=\"sm\" data-ping=\"" +
          escapeHtml(c.camera_id) + "\">Ping</button></div></td>" +
          "<td>" + badge(c.online) +
          "<div class=\"st-sub\">Проверено: " + fmtTs(c.last_check_at) + "</div>" +
          "<div class=\"st-sub\">Последний online: " + fmtTs(c.last_seen_online) + "</div>" +
          hostLine + errLine + "</td>";
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll("[data-play]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const id = btn.getAttribute("data-play");
          const r = await fetch("/api/cameras/" + encodeURIComponent(id) + "/ffplay", { method: "POST" });
          btn.disabled = false;
          if (!r.ok) {
            const t = await r.json().catch(() => ({}));
            alert(apiErrorText(t) || r.statusText);
          } else await load(false);
        });
      });
      tbody.querySelectorAll("[data-ping]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const id = btn.getAttribute("data-ping");
          await fetch("/api/cameras/" + encodeURIComponent(id) + "/ping", { method: "POST" });
          await load(false);
          btn.disabled = false;
        });
      });
    }

    async function uploadExcel() {
      const inp = document.getElementById("file-xlsx");
      if (!inp.files || !inp.files[0]) {
        alert("Выберите файл .xlsx");
        return;
      }
      const fd = new FormData();
      fd.append("file", inp.files[0]);
      const btn = document.getElementById("btn-upload");
      btn.disabled = true;
      try {
        const res = await fetch("/api/cameras/upload-excel", { method: "POST", body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showAlert(apiErrorText(data) || res.statusText);
          return;
        }
        await load(false);
      } catch (e) {
        showAlert("Сеть: " + (e && e.message ? e.message : e));
      } finally {
        btn.disabled = false;
      }
    }

    async function pingAll() {
      const btn = document.getElementById("btn-ping-all");
      btn.disabled = true;
      try {
        const res = await fetch("/api/cameras/ping-all", { method: "POST" });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showAlert(apiErrorText(data) || res.statusText);
          return;
        }
        await load(false);
      } catch (e) {
        showAlert("Сеть: " + (e && e.message ? e.message : e));
      } finally {
        btn.disabled = false;
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    load(false);
    setInterval(() => load(false), 20000);
    setInterval(() => { if (dataSource === "sheets") checkSheetsAccess(); }, 5 * 60 * 1000);
  </script>
</body>
</html>
